{% extends "base.html" %}

{% block title %}Bienvenido — Hotel Salvador{% endblock %}

{% block content %}
<section class="hero" style="background-image: url('{{ url_for('static', filename='img/hero-hotel.jpg') }}');">
    <div class="hero__overlay"></div>
    <div class="hero__content">
        <h1 class="hero__title">Bienvenido{{ ", " + session['nombre'] if session.get('nombre') else "" }}</h1>
        <p class="hero__subtitle">Comencemos con seleccionar tu habitación.</p>
        <a href="{{ url_for('cliente_habitaciones') }}" class="btn-vamos">¡Vamos!</a>
    </div>
</section>
{% endblock %}
